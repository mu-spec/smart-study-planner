workflows:
  android-release-apk:
    name: Android Release APK
    max_build_duration: 60
    environment:
      node: 20
      java: 17
      vars:
        EXPO_PUBLIC_ADMOB_APP_ID_ANDROID: "ca-app-pub-7540130362404221~7560134937"
        EXPO_PUBLIC_ADMOB_BANNER_ANDROID: "ca-app-pub-7540130362404221/7636156550"
        EXPO_PUBLIC_ADMOB_INTERSTITIAL_ANDROID: "ca-app-pub-7540130362404221/5009993212"
        EXPO_PUBLIC_ADMOB_APP_ID_IOS: "ca-app-pub-xxxxxxxxxxxxxxxx~bbbbbbbbbb"
        EXPO_PUBLIC_ADMOB_BANNER_IOS: "ca-app-pub-xxxxxxxxxxxxxxxx/cccccccccc"
        EXPO_PUBLIC_ADMOB_INTERSTITIAL_IOS: "ca-app-pub-xxxxxxxxxxxxxxxx/dddddddddd"
    scripts:
      - name: Install dependencies
        script: |
          npm ci
          npm install --no-save @react-native-community/cli@latest
      - name: Patch ads module for RN compatibility
        script: |
          ADS_FILE="node_modules/react-native-google-mobile-ads/android/src/main/java/io/invertase/googlemobileads/ReactNativeGoogleMobileAdsModule.kt"
          if [ -f "$ADS_FILE" ]; then
            perl -0777 -i -pe 's/\bcurrentActivity\b/reactApplicationContext.currentActivity/g' "$ADS_FILE"
            perl -0777 -i -pe 's/reactApplicationContext\.reactApplicationContext\.currentActivity/reactApplicationContext.currentActivity/g' "$ADS_FILE"
          fi
      - name: Generate native project and launcher icon sizes
        script: |
          npx expo prebuild --platform android
      - name: Build release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/mapping/release/*
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
